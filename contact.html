<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | FITNESS GUIDE</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .contact-section {
            background: transparent;
            padding: 140px 20px 50px;
            max-width: 800px;
            margin: 0 auto;
        }

        .contact-section h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .contact-section p {
            text-align: center;
            margin-bottom: 40px;
            font-size: 1.1em;
            color: #666;
        }

        .dark-mode .contact-section p {
            color: #cccccc;
        }

        .contact-form {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .dark-mode .contact-form {
            background: #2d2d2d;
            color: #ffffff;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .dark-mode .form-group label {
            color: #ffffff;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }

        .dark-mode .form-group input,
        .dark-mode .form-group textarea {
            background: #1a1a1a;
            border-color: #555;
            color: #ffffff;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            height: 120px;
            resize: vertical;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .dark-mode .success-message {
            background: #1e4620;
            color: #4caf50;
            border-color: #2e7d32;
        }

        .dark-mode .error-message {
            background: #4a1e1e;
            color: #f44336;
            border-color: #d32f2f;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <div class="Nav-bar">   
        <nav>
            <h2 id="logo"><span>FITNESS GUIDE</span></h2>
            <ul>
                <li><a href="main.html">Main</a></li>
                <li><a href="Home.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html" class="active">Contact</a></li> 
                <li><a href="Help.html">Help</a></li> 
                <li><button class="theme-toggle-nav" id="themeToggleNav">
                    <span id="themeIconNav">🌙</span>
                </button></li>
            </ul>
        </nav>
    </div>

    <section class="contact-section">
            <h1>Contact Us</h1>
            <p>Have questions or need support? Fill out the form below and we'll get back to you as soon as possible.</p>
            
            <div id="messageDiv"></div>
            
            <div class="contact-form">
                <form id="contactForm">
                    <div class="form-group">
                        <label for="name">Full Name *</label>
                        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                    </div>
                
                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email address" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number (Optional)</label>
                        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
                    </div>

                    <div class="form-group">
                        <label for="subject">Subject (Optional)</label>
                        <input type="text" id="subject" name="subject" placeholder="Brief subject of your message">
                    </div>
                
                    <div class="form-group">
                        <label for="message">Your Message *</label>
                        <textarea id="message" name="message" placeholder="Write your message here..." required></textarea>
                    </div>
                
                    <button type="submit" class="submit-btn" id="submitBtn">Send Message</button>
                </form>
        </div>
    </section>

    <footer>
        <p>&copy; <span id="year"></span> FITNESS GUIDE. All Rights Reserved.</p>
    </footer>

    <script src="assets/js/theme-manager.js" defer></script>
    <script src="assets/js/script.js" defer></script>
    <script>
        document.getElementById("year").textContent = new Date().getFullYear();

        // Handle contact form submission
        document.getElementById('contactForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const messageDiv = document.getElementById('messageDiv');
            
            // Get form data
            const formData = {
                name: document.getElementById('name').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                subject: document.getElementById('subject').value.trim(),
                message: document.getElementById('message').value.trim()
            };
            
            // Validate required fields
            if (!formData.name || !formData.email || !formData.message) {
                showMessage('Please fill in all required fields.', 'error');
                return;
            }
            
            // Disable submit button and show loading
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';
            
            try {
                const response = await fetch('/api/contact/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('Submitted successfully! We will get back to you soon.', 'success');
                    document.getElementById('contactForm').reset();
                    console.log('Contact form submitted successfully. Submission ID:', data.submissionId);
                } else {
                    showMessage(data.message || 'Failed to send message. Please try again.', 'error');
                }
            } catch (error) {
                console.error('Contact form submission error:', error);
                showMessage('Network error. Please check your connection and try again.', 'error');
            } finally {
                // Re-enable submit button
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Message';
            }
        });

        function showMessage(message, type) {
            const messageDiv = document.getElementById('messageDiv');
            messageDiv.innerHTML = `<div class="message ${type}-message">${message}</div>`;
            
            // Auto-hide success messages after 5 seconds
            if (type === 'success') {
                setTimeout(() => {
                    messageDiv.innerHTML = '';
                }, 5000);
            }
        }
    </script>
</body>
</html>
