<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
    <title>Reset Password | Fitness Guide</title>
    <style>
        body {
            background-image: url('/Images/bg.jpg');
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .reset-container {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .reset-container h2 {
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            box-sizing: border-box;
        }
        button[type="submit"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background-color: #4CAF50;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button[type="submit"]:hover {
            background-color: #45a049;
        }
        .back-to-login {
            text-align: center;
            margin-top: 15px;
        }
        .back-to-login a {
            color: #4CAF50;
            text-decoration: none;
        }
        .back-to-login a:hover {
            text-decoration: underline;
        }
        .message {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
        .success {
            background-color: #dff0d8;
            color: #3c763d;
        }
        .error {
            background-color: #f2dede;
            color: #a94442;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <h2>Reset Your Password</h2>
        <div id="resetForm">
            <p>Enter your email address and we'll send you a link to reset your password.</p>
            <form id="passwordResetForm" onsubmit="handleResetRequest(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <button type="submit">Send Reset Link</button>
            </form>
            <div class="back-to-login">
                Remember your password? <a href="login.html">Back to Login</a>
            </div>
        </div>
        <div id="successMessage" class="message success" style="display: none;">
            Password reset link has been sent to your email address.
        </div>
        <div id="errorMessage" class="message error" style="display: none;">
            An error occurred. Please try again later.
        </div>
    </div>

    <script>
        function handleResetRequest(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            
            // In a real application, you would send this to your backend
            // For demo purposes, we'll just show the success message
            showMessage('success');
            
            // Reset form
            document.getElementById('passwordResetForm').reset();
        }
        
        function showMessage(type) {
            // Hide all messages first
            document.querySelectorAll('.message').forEach(el => {
                el.style.display = 'none';
            });
            
            // Show the requested message
            if (type === 'success') {
                document.getElementById('successMessage').style.display = 'block';
                document.getElementById('resetForm').style.display = 'none';
            } else {
                document.getElementById('errorMessage').style.display = 'block';
            }
        }
    </script>
</body>
</html>
